<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rezToolsAi - Lyrics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
            /* Hapus overflow hidden di sini agar user bisa scroll layar jika perlu */
        }

        /* --- Navbar --- */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(15, 12, 41, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand-name {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(to right, #fff, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- Main Content --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            width: 100%;
            max-width: 600px; /* Batasi lebar container utama */
            margin: 0 auto;   /* Pusatkan container */
        }

        /* --- Search Box --- */
        .search-box {
            width: 100%;
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 5px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            background: none;
            border: none;
            padding: 12px 15px;
            color: white;
            outline: none;
            font-size: 0.95rem;
            min-width: 0; /* Penting agar input tidak maksa lebar di mobile */
        }

        .search-box button {
            background: #6c5ce7;
            border: none;
            color: white;
            width: 50px;
            height: 45px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-box button:active {
            transform: scale(0.95);
        }

        /* --- Lyrics Card --- */
        .lyrics-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            width: 100%;
            display: none; /* Muncul via JS */
            flex-direction: column;
            max-height: 70vh; /* Agar tidak melampaui layar HP */
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            animation: slideUp 0.4s ease-out;
        }

        .lyrics-header {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .song-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #a29bfe;
            text-transform: uppercase;
        }

        .lyrics-body {
            padding: 20px;
            overflow-y: auto;
            text-align: center;
            scrollbar-width: thin;
        }

        .lyrics-text {
            line-height: 1.8;
            font-size: 0.95rem;
            color: #efefef;
            white-space: pre-line;
            padding-bottom: 20px;
        }

        /* --- Loading & State --- */
        #placeholder-text {
            margin-top: 30px;
            color: rgba(255,255,255,0.4);
            font-size: 0.9rem;
            text-align: center;
        }

        .loading-spinner {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #a29bfe;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsivitas untuk layar sangat kecil */
        @media (max-width: 360px) {
            .navbar { padding: 10px 15px; }
            .brand-name { font-size: 1rem; }
            .lyrics-text { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="https://rezatools-ai-website.vercel.app/" style="color: white; opacity: 0.6; text-decoration: none;"><i class="fas fa-arrow-left"></i></a>
        <div class="brand-name">rezToolsAi</div>
        <i class="fas fa-music" style="color: #a29bfe;"></i>
    </nav>

    <main class="main-content">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Cari lirik lagu..." autocomplete="off">
            <button onclick="getLyrics()" aria-label="Search"><i class="fas fa-search"></i></button>
        </div>

        <div id="placeholder-text">Masukkan judul lagu untuk mencari lirik</div>
        <div class="loading-spinner" id="loader"></div>

        <div class="lyrics-card" id="lyricsCard">
            <div class="lyrics-header">
                <div class="song-title" id="titleDisplay"></div>
            </div>
            <div class="lyrics-body">
                <div class="lyrics-text" id="lyricsDisplay"></div>
            </div>
        </div>
    </main>

    <script>
        async function getLyrics() {
            const query = document.getElementById('searchInput').value.trim();
            const card = document.getElementById('lyricsCard');
            const lyricsDisplay = document.getElementById('lyricsDisplay');
            const titleDisplay = document.getElementById('titleDisplay');
            const loader = document.getElementById('loader');
            const placeholder = document.getElementById('placeholder-text');

            if (!query) return;

            // Reset view
            placeholder.style.display = 'none';
            card.style.display = 'none';
            loader.style.display = 'block';

            try {
                const response = await fetch(`https://api.sxtream.my.id/search/lirik?q=${encodeURIComponent(query)}`);
                const result = await response.json();

                if (result.success && result.data.lyrics) {
                    titleDisplay.innerText = query; 
                    lyricsDisplay.innerText = result.data.lyrics;
                    
                    loader.style.display = 'none';
                    card.style.display = 'flex';
                    // Scroll ke atas card otomatis
                    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
                } else {
                    throw new Error("Empty");
                }
            } catch (err) {
                loader.style.display = 'none';
                placeholder.style.display = 'block';
                placeholder.innerText = "❌ Lirik tidak ditemukan atau server sibuk.";
            }
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                getLyrics();
                document.getElementById('searchInput').blur(); // Tutup keyboard mobile
            }
        });
    </script>
</body>
</html>
